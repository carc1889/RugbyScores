<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RugbyScore · Nueva contraseña</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0e14; --bg2:#111720; --bg3:#1a2230; --border:#1e2d40; --accent:#00e57a; --accent2:#00b85e; --red:#ff3d5a; --text:#e8edf5; --muted:#5a6a80; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .box { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:36px 32px; width:380px; max-width:95vw; }
  .logo { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:26px; color:var(--accent); margin-bottom:4px; }
  .logo span { color:var(--text); }
  .sub { font-size:12px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:28px; }
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .form-group input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:7px; padding:10px 12px; color:var(--text); font-family:'Barlow',sans-serif; font-size:14px; outline:none; transition:border-color .15s; }
  .form-group input:focus { border-color:var(--accent); }
  .btn { background:var(--accent); color:#000; border:none; border-radius:7px; padding:11px 20px; font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:14px; letter-spacing:.5px; text-transform:uppercase; cursor:pointer; width:100%; margin-top:4px; transition:background .15s; }
  .btn:hover { background:var(--accent2); }
  .btn:disabled { background:var(--muted); cursor:not-allowed; }
  .msg { font-size:13px; margin-top:12px; text-align:center; line-height:1.5; }
  .msg.error { color:var(--red); }
  .msg.success { color:var(--accent); }
  .spinner-wrap { text-align:center; padding:20px 0; color:var(--muted); font-size:13px; }
  .spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 10px; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="box">
  <div class="logo">RUGBY<span>SCORE</span></div>
  <div class="sub">Configurar contraseña</div>
  <div id="content">
    <div class="spinner-wrap"><div class="spinner"></div>Verificando enlace...</div>
  </div>
</div>

<script>
const SB_URL = 'https://hwpodschtbigiyceirpj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3cG9kc2NodGJpZ2l5Y2VpcnBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjUzOTgsImV4cCI6MjA5MDEwMTM5OH0.TPnq-4sEYhzqLmhjvbTuJhBHw-TbMeqfY5RrT65NiZE';

// Supabase pone el token en el hash de la URL: #access_token=...&type=recovery
function getHashParams() {
  var hash = window.location.hash.substring(1);
  var params = {};
  hash.split('&').forEach(function(p) {
    var parts = p.split('=');
    params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1] || '');
  });
  return params;
}

var accessToken = null;

window.addEventListener('load', function() {
  var params = getHashParams();
  accessToken = params['access_token'];
  var type = params['type'];

  if (accessToken && (type === 'recovery' || type === 'invite')) {
    showForm();
  } else {
    // Token no encontrado en hash — puede que Supabase lo haya puesto en la URL como query param
    var urlParams = new URLSearchParams(window.location.search);
    var code = urlParams.get('code');
    if (code) {
      exchangeCode(code);
    } else {
      showError('El enlace no es válido o ya fue usado. Pedí un nuevo enlace de recuperación.');
    }
  }
});

// Algunos flujos de Supabase usan PKCE y envían un "code" en lugar del token directo
async function exchangeCode(code) {
  document.getElementById('content').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>Verificando código...</div>';
  try {
    var res = await fetch(SB_URL + '/auth/v1/token?grant_type=pkce', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'apikey': SB_KEY },
      body: JSON.stringify({ auth_code: code })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.message || 'Error al verificar');
    accessToken = data.access_token;
    showForm();
  } catch(e) {
    showError('No se pudo verificar el enlace: ' + e.message);
  }
}

function showForm() {
  document.getElementById('content').innerHTML =
    '<div class="form-group"><label>Nueva contraseña</label>' +
    '<input id="pw1" type="password" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key===\'Enter\')setPassword()"></div>' +
    '<div class="form-group"><label>Repetir contraseña</label>' +
    '<input id="pw2" type="password" placeholder="Repetir contraseña" onkeydown="if(event.key===\'Enter\')setPassword()"></div>' +
    '<button class="btn" id="btnSet" onclick="setPassword()">Guardar contraseña</button>' +
    '<div class="msg" id="msg"></div>';
  document.getElementById('pw1').focus();
}

async function setPassword() {
  var pw1 = document.getElementById('pw1').value;
  var pw2 = document.getElementById('pw2').value;
  var msg = document.getElementById('msg');
  var btn = document.getElementById('btnSet');

  if (pw1.length < 6) { msg.className='msg error'; msg.textContent='La contraseña debe tener al menos 6 caracteres.'; return; }
  if (pw1 !== pw2) { msg.className='msg error'; msg.textContent='Las contraseñas no coinciden.'; return; }

  btn.disabled = true; btn.textContent = 'Guardando...'; msg.textContent = '';

  try {
    var res = await fetch(SB_URL + '/auth/v1/user', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + accessToken
      },
      body: JSON.stringify({ password: pw1 })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.message || 'Error al guardar');

    msg.className = 'msg success';
    msg.textContent = '¡Contraseña guardada! Redirigiendo al panel admin...';
    setTimeout(function() { window.location.href = 'admin.html'; }, 2000);
  } catch(e) {
    msg.className = 'msg error';
    msg.textContent = 'Error: ' + e.message;
    btn.disabled = false; btn.textContent = 'Guardar contraseña';
  }
}

function showError(text) {
  document.getElementById('content').innerHTML =
    '<div class="msg error">' + text + '</div>' +
    '<div style="margin-top:20px;text-align:center"><a href="admin.html" style="color:var(--muted);font-size:13px">&#8592; Volver al login</a></div>';
}
</script>
</body>
</html>
