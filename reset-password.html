<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RugbyScore · Nueva contraseña</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0e14; --bg2:#111720; --bg3:#1a2230; --border:#1e2d40; --accent:#00e57a; --accent2:#00b85e; --red:#ff3d5a; --text:#e8edf5; --muted:#5a6a80; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .box { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:36px 32px; width:400px; max-width:95vw; }
  .logo { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:26px; color:var(--accent); margin-bottom:4px; }
  .logo span { color:var(--text); }
  .sub { font-size:12px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:28px; }
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .form-group input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:7px; padding:10px 12px; color:var(--text); font-family:'Barlow',sans-serif; font-size:14px; outline:none; transition:border-color .15s; }
  .form-group input:focus { border-color:var(--accent); }
  .btn { background:var(--accent); color:#000; border:none; border-radius:7px; padding:11px 20px; font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:14px; letter-spacing:.5px; text-transform:uppercase; cursor:pointer; width:100%; margin-top:4px; transition:background .15s; }
  .btn:hover { background:var(--accent2); }
  .btn:disabled { background:var(--muted); cursor:not-allowed; }
  .msg { font-size:13px; margin-top:12px; text-align:center; line-height:1.5; padding:0 4px; }
  .msg.error { color:var(--red); }
  .msg.success { color:var(--accent); }
  .spinner-wrap { text-align:center; padding:20px 0; color:var(--muted); font-size:13px; }
  .spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .debug { font-size:10px; color:var(--muted); margin-top:16px; word-break:break-all; display:none; }
  footer { background:var(--bg2); border-top:1px solid var(--border); padding:16px 20px; text-align:center; color:var(--muted); font-size:12px; width:100%; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">RUGBY<span>SCORE</span></div>
  <div class="sub">Configurar contraseña</div>
  <div id="content">
    <div class="spinner-wrap"><div class="spinner"></div>Verificando enlace...</div>
  </div>
  <div class="debug" id="debug"></div>
</div>

<script>
const SB_URL = 'https://hwpodschtbigiyceirpj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3cG9kc2NodGJpZ2l5Y2VpcnBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjUzOTgsImV4cCI6MjA5MDEwMTM5OH0.TPnq-4sEYhzqLmhjvbTuJhBHw-TbMeqfY5RrT65NiZE';

var accessToken = null;

function log(msg) {
  var d = document.getElementById('debug');
  d.style.display = 'block';
  d.textContent += msg + '\n';
}

// Parse URL hash into key-value pairs
function parseHash() {
  var hash = window.location.hash.replace(/^#/, '');
  var params = {};
  if (!hash) return params;
  hash.split('&').forEach(function(part) {
    var eq = part.indexOf('=');
    if (eq > -1) {
      var k = decodeURIComponent(part.slice(0, eq));
      var v = decodeURIComponent(part.slice(eq + 1));
      params[k] = v;
    }
  });
  return params;
}

window.addEventListener('load', function() {
  var hashParams = parseHash();
  var queryParams = new URLSearchParams(window.location.search);

  var accessTokenFromHash = hashParams['access_token'];
  var typeFromHash = hashParams['type'];
  var codeFromQuery = queryParams.get('code');
  var tokenFromQuery = queryParams.get('token');
  var typeFromQuery = queryParams.get('type');

  log('hash type: ' + typeFromHash);
  log('hash token present: ' + !!accessTokenFromHash);
  log('query code: ' + !!codeFromQuery);
  log('query token: ' + !!tokenFromQuery);
  log('query type: ' + typeFromQuery);

  if (accessTokenFromHash && (typeFromHash === 'invite' || typeFromHash === 'recovery')) {
    // Classic flow: token in hash
    accessToken = accessTokenFromHash;
    showForm();
  } else if (codeFromQuery) {
    // PKCE flow: exchange code for token
    exchangePKCE(codeFromQuery);
  } else if (tokenFromQuery && (typeFromQuery === 'invite' || typeFromQuery === 'recovery')) {
    // Legacy flow: token in query string — verify it to get session
    verifyToken(tokenFromQuery, typeFromQuery);
  } else if (accessTokenFromHash) {
    // Token in hash but no type — try anyway
    accessToken = accessTokenFromHash;
    showForm();
  } else {
    showError('El enlace no es válido o ya fue usado.<br>Pedí al administrador que te envíe una nueva invitación.');
  }
});

// PKCE flow: exchange code for access_token
async function exchangePKCE(code) {
  document.getElementById('content').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>Verificando código...</div>';
  try {
    var res = await fetch(SB_URL + '/auth/v1/token?grant_type=pkce', {
      method: 'POST',
      headers: { 'Content-Type':'application/x-www-form-urlencoded', 'apikey': SB_KEY },
      body: 'auth_code=' + encodeURIComponent(code) + '&code_verifier=null'
    });
    var data = await res.json();
    log('pkce response: ' + JSON.stringify(data).slice(0,120));
    if (data.access_token) {
      accessToken = data.access_token;
      showForm();
    } else {
      throw new Error(data.error_description || data.message || 'No se pudo obtener el token');
    }
  } catch(e) {
    showError('Error al verificar el enlace: ' + e.message);
  }
}

// Legacy verify flow
async function verifyToken(token, type) {
  document.getElementById('content').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>Verificando...</div>';
  try {
    var res = await fetch(SB_URL + '/auth/v1/verify', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'apikey': SB_KEY },
      body: JSON.stringify({ token: token, type: type })
    });
    var data = await res.json();
    log('verify response: ' + JSON.stringify(data).slice(0,120));
    if (data.access_token) {
      accessToken = data.access_token;
      showForm();
    } else {
      throw new Error(data.error_description || data.message || 'Token inválido');
    }
  } catch(e) {
    showError('Error al verificar el enlace: ' + e.message);
  }
}

function showForm() {
  document.getElementById('content').innerHTML =
    '<div class="form-group">' +
      '<label>Nueva contraseña</label>' +
      '<input id="pw1" type="password" placeholder="Minimo 6 caracteres">' +
    '</div>' +
    '<div class="form-group">' +
      '<label>Repetir contraseña</label>' +
      '<input id="pw2" type="password" placeholder="Repetir contraseña">' +
    '</div>' +
    '<button class="btn" id="btnSet" onclick="setPassword()">Guardar contraseña</button>' +
    '<div class="msg" id="setMsg"></div>';

  document.getElementById('pw1').focus();
  document.getElementById('pw2').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') setPassword();
  });
}

async function setPassword() {
  var pw1 = document.getElementById('pw1').value;
  var pw2 = document.getElementById('pw2').value;
  var msg = document.getElementById('setMsg');
  var btn = document.getElementById('btnSet');

  if (pw1.length < 6) { msg.className='msg error'; msg.textContent='La contraseña debe tener al menos 6 caracteres.'; return; }
  if (pw1 !== pw2) { msg.className='msg error'; msg.textContent='Las contraseñas no coinciden.'; return; }

  btn.disabled = true; btn.textContent = 'Guardando...'; msg.textContent = '';

  try {
    var res = await fetch(SB_URL + '/auth/v1/user', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + accessToken
      },
      body: JSON.stringify({ password: pw1 })
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.message || 'Error al guardar');

    msg.className = 'msg success';
    msg.textContent = 'Contrasena guardada. Redirigiendo al panel admin...';
    setTimeout(function() { window.location.href = 'admin.html'; }, 2000);
  } catch(e) {
    msg.className = 'msg error';
    msg.textContent = 'Error: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Guardar contraseña';
  }
}

function showError(text) {
  document.getElementById('content').innerHTML =
    '<div class="msg error">' + text + '</div>' +
    '<div style="margin-top:20px;text-align:center">' +
      '<a href="admin.html" style="color:var(--muted);font-size:13px">&#8592; Volver al login</a>' +
    '</div>';
}
</script>
<footer>Powered by MD</footer>
</body>
</html>
